{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ofertas - FERREMAS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
  <style>
    .oferta-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }
    .oferta-card:hover {
      transform: scale(1.02);
    }
    .precio-anterior {
      color: #888;
      text-decoration: line-through;
    }
    .precio-actual {
      color: #d32f2f;
      font-weight: bold;
      font-size: 1.25rem;
    }
    .btn-ver {
      background-color: #FFB300;
      color: white;
      font-weight: bold;
    }
    .btn-ver:hover {
      background-color: #FFA000;
    }
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="text-center mb-4">Ofertas Especiales</h1>
  <div id="contenedor-ofertas" class="row g-4 justify-content-center">
    <!-- Contenido dinámico -->
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch('/productos/api/ofertas/')
      .then(res => res.json())
      .then(data => {
        const contenedor = document.getElementById("contenedor-ofertas");
        if (data.length === 0) {
          contenedor.innerHTML = "<p class='text-center'>No hay productos en oferta actualmente.</p>";
          return;
        }

        data.forEach(prod => {
          const col = document.createElement("div");
          col.className = "col-md-4 col-sm-6";
          col.innerHTML = `
            <div class="oferta-card p-3 bg-white h-100 d-flex flex-column">
              <img src="${prod.imagen}" alt="${prod.nombre}" class="img-fluid mb-3 rounded">
              <h5 class="mb-2">${prod.nombre}</h5>
              <p class="precio-anterior">$${prod.precio_anterior ?? ''}</p>
              <p class="precio-actual">$${prod.precio}</p>
              <p class="text-muted">${prod.descripcion}</p>
              <a href="/productos/${prod.id}/" class="btn btn-ver mt-auto align-self-start">Ver Producto</a>
            </div>
          `;
          contenedor.appendChild(col);
        });
      });
  });
</script>

</body>
</html>
