{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productos - FERREMAS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

      <!-- Font Awesome para íconos -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  

    <style>
        body {
            background-color: #f4f4f9;
        }

        .card-title {
            font-weight: bold;
        }

        .btn-comprar {
            background-color: #FFB300;
            color: white;
            font-weight: bold;
        }

        .btn-comprar:hover {
            background-color: #FFA000;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-container input {
            width: 300px;
            border-radius: 30px 0 0 30px;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .product-card {
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            background-color: white;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .product-stock {
            font-size: 1rem;
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FF5733;
            margin-top: 20px;
        }

        .product-info {
            margin-top: 30px;
        }

        .product-card-body {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 20px;
        }

        footer {
            background-color: #2E7D32;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2E7D32;">
    <div class="container">
        <a class="navbar-brand" href="/"><a class="navbar-brand" href="/"><img src="{% static 'img/logo.png' %}" alt="logo" style="height: 70px; border-radius: 15px 0 15px 0;"></a>    </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/productos/">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>

                <!-- Botón estilizado con borde blanco -->
                <li class="nav-item ms-3">
                    <a class="btn btn-outline-light d-flex align-items-center px-3 py-2" href="/usuarios/iniciosesion/">
                        <i class="fas fa-user me-2"></i> Iniciar Sesión
                    </a>
                </li>

                <!-- Panel de administración -->
                <li class="nav-item ms-2">
                    <a class="nav-link" href="{% url 'lista_productos_crud' %}">Panel de Administración</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
    

<div class="container my-5">
    <h2 class="text-center mb-5">Nuestros Productos</h2>

    <div class="row g-4" id="product-list">
        <!-- Aquí se llenarán los productos con JS -->
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <p>© 2025 FERREMAS - Todos los derechos reservados</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Inyectar entorno desde Django -->
<script>
    document.body.dataset.entorno = "{{ entorno }}";
</script>

<!-- JS dinámico para cargar productos -->
<script src="{% static 'js/lista_productos.js' %}"></script>

</body>
</html>
