<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productos - FERREMAS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f4f9;
        }

        .card-title {
            font-weight: bold;
        }

        .btn-comprar {
            background-color: #FFB300;
            color: white;
            font-weight: bold;
        }

        .btn-comprar:hover {
            background-color: #FFA000;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-container input {
            width: 300px;
            border-radius: 30px 0 0 30px;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .product-card {
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            background-color: white;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .product-stock {
            font-size: 1rem;
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FF5733;
            margin-top: 20px;
        }

        .product-info {
            margin-top: 30px;
        }

        .product-card-body {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container my-5">
    <h2 class="text-center mb-5">Nuestros Productos</h2>

    <div class="row g-4">
        {% for producto in productos %}
        <div class="col-md-4">
            <div class="card product-card h-100">
                <img src="{{ producto.imagen }}" class="card-img-top product-img" alt="{{ producto.nombre }}">
                <div class="card-body product-card-body">
                    <h5 class="card-title">{{ producto.nombre }}</h5>
                    <p class="card-text">${{ producto.precio }}</p>
                    <p class="card-text"><small class="text-muted">{{ producto.categoria }}</small></p>
                    <p class="product-stock">Stock disponible: {{ producto.stock }}</p>
                    <a href="/productos/{{ producto.id }}/" class="btn btn-primary mb-2">Ver Producto</a>
                    <a href="#" class="btn btn-comprar" onclick="alert('Producto agregado al carrito! ID del producto: {{ producto.id }}')">Agregar al Carrito</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
