{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administrar Productos - FERREMAS</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/crud.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2E7D32;">
    <div class="container">
        <a class="navbar-brand" href="/"><img src="{% static 'img/logo.png' %}" alt="logo" style="height: 70px; border-radius: 15px 0 15px 0;"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/productos/">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                <li class="nav-item"><a class="nav-link" href="/productos/crud/">Panel de Administración</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<main class="container my-5">
    <h1 class="text-center mb-4">Panel de Administración de Productos</h1>

    <div class="text-center mb-4">
        <a href="{% url 'formulario_producto' %}" class="btn btn-success me-2">Agregar Producto</a>
        <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>

    <div id="listado">
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-success">
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Descripción</th>
                        <th>Imagen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos">
                    <!-- JS insertará las filas -->
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="text-center p-3">
    <p>© 2025 FERREMAS - Todos los derechos reservados</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script para cargar y eliminar productos -->
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// Detectar si es entorno local usando 127.0.0.1 o localhost
const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";

const apiUrl = isLocal
    ? "http://127.0.0.1:8000/productos/api/"
    : "https://prueba-propia-ferremas-production.up.railway.app/productos/api/";

fetch(apiUrl)
    .then(response => response.json())
    .then(productos => {
        const tabla = document.getElementById("tabla-productos");
        tabla.innerHTML = "";

        productos.forEach(producto => {
            const fila = `
                <tr>
                    <td>${producto.nombre}</td>
                    <td>$${producto.precio}</td>
                    <td>${producto.descripcion}</td>
                    <td><img src="${producto.imagen}" style="width: 80px; height: 80px; object-fit: cover;"></td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="eliminarProducto(${producto.id})">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                        <a href="/productos/editar/${producto.id}/" class="btn btn-warning btn-sm">
                            <i class="fas fa-pencil-alt"></i> Editar
                        </a>
                    </td>
                </tr>
            `;
            tabla.insertAdjacentHTML("beforeend", fila);
        });
    })
    .catch(error => {
        console.error("Error al cargar productos:", error);
        alert("No se pudieron cargar los productos.");
    });

function eliminarProducto(id) {
    if (!confirm("¿Estás seguro de que quieres eliminar este producto?")) return;

    const deleteUrl = isLocal
        ? `http://127.0.0.1:8000/productos/api/eliminar/${id}/`
        : `https://prueba-propia-ferremas-production.up.railway.app/productos/api/eliminar/${id}/`;

    fetch(deleteUrl, {
        method: "DELETE",
        credentials: "same-origin",
        headers: {
            "X-CSRFToken": csrftoken
        }
    })
    .then(response => {
        if (response.status === 204) {
            alert("Producto eliminado correctamente");
            location.reload();
        } else if (response.status === 403) {
            alert("No tienes permisos. Inicia sesión como administrador.");
        } else if (response.status === 404) {
            alert("Producto no encontrado.");
        } else {
            return response.json().then(data => {
                alert("Error: " + (data.error || "Error desconocido"));
            }).catch(() => {
                alert("Error inesperado: respuesta no fue JSON.");
            });
        }
    })
    .catch(error => {
        console.error("Error al eliminar producto:", error);
        alert("Error al conectar con el servidor.");
    });
}
</script>

</body>
</html>
