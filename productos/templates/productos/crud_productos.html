{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administrar Productos - FERREMAS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/crud.css' %}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #28a745 0%, #006400 100%);
      color: #fff;
      font-family: 'Arial', sans-serif;
      padding-top: 30px;
    }

    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      color: #333;
    }

    h1, h3 {
      color: #333;
    }

    .btn-success, .btn-outline-secondary {
      font-weight: bold;
    }

    .btn-success {
      background-color: #28a745;
      border-color: #28a745;
    }

    .btn-outline-secondary {
      color: #333;
      border-color: #ddd;
    }

    .btn-outline-secondary:hover {
      background-color: #f8f9fa;
    }

    .table {
      margin-top: 20px;
    }

    .table th {
      background-color: #28a745;
      color: white;
    }

    .table td {
      vertical-align: middle;
    }

    .table img {
      max-width: 50px;
      height: auto;
      border-radius: 5px;
    }

    .table-responsive {
      margin-top: 20px;
    }

    .text-center {
      text-align: center;
    }

    .mb-4 {
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-weight: bold;
    }

    .btn {
      transition: all 0.3s ease;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<main class="container my-5">
  <h1 class="text-center mb-4">Panel de Administración de Productos</h1>

  <div class="text-center mb-4">
    <a href="{% url 'formulario_producto' %}" class="btn btn-success me-2">Agregar Producto</a>
    <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
  </div>

  <div class="mb-3">
    <label class="form-label">Filtrar por Categoría:</label>
    <select class="form-select w-auto d-inline-block" id="filtro-categoria">
      <option value="">Todas</option>
    </select>
  </div>

  <h3>Productos Activos</h3>
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-success text-center">
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Descripción</th>
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-productos" class="text-center"></tbody>
    </table>
  </div>

  <h3 class="mt-5">Productos Deshabilitados</h3>
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-secondary text-center">
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Descripción</th>
          <th>Imagen</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-deshabilitados" class="text-center"></tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const categoriasDisponibles = [
  "Herramientas", "Construcción", "Electricidad", "Pinturas",
  "Gasfitería", "Adhesivos", "Iluminación", "Ferretería", "Seguridad", "Otra"
];

const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
const apiUrl = isLocal
  ? "http://127.0.0.1:8000/productos/api/admin/"
  : "https://prueba-propia-ferremas-production.up.railway.app/productos/api/admin/";

document.addEventListener("DOMContentLoaded", () => {
  const filtro = document.getElementById("filtro-categoria");
  categoriasDisponibles.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat.toLowerCase();
    option.textContent = cat;
    filtro.appendChild(option);
  });

  fetch(apiUrl)
    .then(response => response.json())
    .then(productos => {
      const tabla = document.getElementById("tabla-productos");
      const tablaDeshabilitados = document.getElementById("tabla-deshabilitados");

      function render() {
        const filtroVal = filtro.value.toLowerCase();
        tabla.innerHTML = "";
        tablaDeshabilitados.innerHTML = "";

        productos.forEach(producto => {
          let categoria = producto.categoria?.trim() || "Otra";
          if (!categoriasDisponibles.includes(categoria)) {
            categoria = "Otra";
          }

          if (filtroVal && categoria.toLowerCase() !== filtroVal) return;

          const fila = `
            <tr>
              <td>${producto.nombre}</td>
              <td>${categoria}</td>
              <td>$${producto.precio}</td>
              <td>${producto.stock}</td>
              <td>${producto.descripcion}</td>
              <td><img src="${producto.imagen}" class="img-preview" style="width: 60px; height: 60px; object-fit: cover;"></td>
              <td>
                <button class="btn btn-${producto.activo ? 'danger' : 'success'} btn-sm mb-1" onclick="toggleActivoProducto(${producto.id})">
                  <i class="fas fa-${producto.activo ? 'trash' : 'undo'}"></i> ${producto.activo ? 'Desactivar' : 'Reactivar'}
                </button>
                ${producto.activo ? `<a href="/productos/editar/${producto.id}/" class="btn btn-warning btn-sm mb-1"><i class="fas fa-pencil-alt"></i> Editar</a>` : ''}
              </td>
            </tr>
          `;

          if (producto.activo) {
            tabla.insertAdjacentHTML("beforeend", fila);
          } else {
            tablaDeshabilitados.insertAdjacentHTML("beforeend", fila);
          }
        });
      }

      filtro.addEventListener("change", render);
      render();
    });
});

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
const csrftoken = getCookie('csrftoken');

function toggleActivoProducto(id) {
  if (!confirm("¿Estás seguro de que quieres cambiar el estado de este producto?")) return;

  const toggleUrl = isLocal
    ? `http://127.0.0.1:8000/productos/api/toggle-activo/${id}/`
    : `https://prueba-propia-ferremas-production.up.railway.app/productos/api/toggle-activo/${id}/`;

  fetch(toggleUrl, {
    method: "PATCH",
    credentials: "same-origin",
    headers: {
      "X-CSRFToken": csrftoken
    }
  })
  .then(response => response.json())
  .then(data => {
    alert(data.mensaje || "Estado actualizado");
    location.reload();
  })
  .catch(error => {
    console.error("Error al actualizar producto:", error);
    alert("Error al conectar con el servidor.");
  });
}
</script>
</body>
</html>
