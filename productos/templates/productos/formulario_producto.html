{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
  <h1 class="text-center text-success mb-4">Agregar Producto</h1>
  <form id="form-producto">
    <div class="mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" id="nombre" required></div>
    <div class="mb-3"><label class="form-label">Descripción</label><textarea class="form-control" id="descripcion" required></textarea></div>
    <div class="mb-3"><label class="form-label">Precio</label><input type="number" class="form-control" id="precio" required step="0.01"></div>
    <div class="mb-3"><label class="form-label">Imagen (URL)</label><input type="url" class="form-control" id="imagen"></div>
    <div class="mb-3"><label class="form-label">Stock</label><input type="number" class="form-control" id="stock" required></div>
    <div class="mb-3">
      <label class="form-label">Categoría</label>
      <select class="form-select" id="categoria" required>
        <option value="" disabled selected>Selecciona una categoría</option>
      </select>
    </div>
    <button type="submit" class="btn btn-success w-100">Agregar</button>
  </form>
  <div class="text-center mt-3"><a href="/productos/crud/" class="btn btn-outline-secondary">Volver al CRUD</a></div>
</div>

<script>
const categoriasDisponibles = [
  "Herramientas", "Construcción", "Electricidad", "Pinturas",
  "Gasfitería", "Adhesivos", "Iluminación", "Ferretería", "Seguridad", "Otra"
];

document.addEventListener("DOMContentLoaded", () => {
  const selectCategoria = document.getElementById("categoria");
  categoriasDisponibles.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    selectCategoria.appendChild(option);
  });
});

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
const csrftoken = getCookie('csrftoken');

document.getElementById("form-producto").addEventListener("submit", function(event) {
  event.preventDefault();
  const data = {
    nombre: document.getElementById("nombre").value,
    descripcion: document.getElementById("descripcion").value,
    precio: document.getElementById("precio").value,
    imagen: document.getElementById("imagen").value,
    stock: document.getElementById("stock").value,
    categoria: document.getElementById("categoria").value
  };

  fetch('/productos/api/agregar/', {
    method: 'POST',
    credentials: 'same-origin',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': csrftoken
    },
    body: JSON.stringify(data)
  })
  .then(response => {
    if (response.status === 403) {
      alert("Acceso denegado. Debes iniciar sesión como administrador.");
      return;
    }
    return response.json();
  })
  .then(data => {
    alert("Producto agregado correctamente!");
    document.getElementById("form-producto").reset();
    window.location.href = "/productos/crud/";
  })
  .catch(error => {
    alert("Error al agregar el producto.");
    console.error("Error:", error);
  });
});
</script>
</body>
</html>
