{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Producto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark" style="background-color: #2E7D32;">
  <div class="container">
    <a class="navbar-brand" href="/">
      <img src="{% static 'img/logo.png' %}" alt="logo" style="height: 70px; border-radius: 15px 0 15px 0;">
    </a>
  </div>
</nav>

<main class="container my-5">
  <h1 class="text-center mb-4">Editar Producto</h1>

  <form id="formEditar">
    {% csrf_token %}
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input type="text" class="form-control" id="nombre" name="nombre" required>
    </div>
    <div class="mb-3">
      <label for="precio" class="form-label">Precio</label>
      <input type="number" class="form-control" id="precio" name="precio" required>
    </div>
    <div class="mb-3">
      <label for="descripcion" class="form-label">Descripción</label>
      <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required></textarea>
    </div>
    <div class="mb-3">
      <label for="imagen" class="form-label">URL de Imagen</label>
      <input type="url" class="form-control" id="imagen" name="imagen">
    </div>
    <div class="mb-3">
      <label for="stock" class="form-label">Stock</label>
      <input type="number" class="form-control" id="stock" name="stock" required>
    </div>
    <div class="mb-3">
      <label for="categoria" class="form-label">Categoría</label>
      <input type="text" class="form-control" id="categoria" name="categoria" required>
    </div>
    <button type="submit" class="btn btn-success">Guardar Cambios</button>
    <a href="/productos/crud/" class="btn btn-secondary">Cancelar</a>
  </form>
</main>

<footer class="text-center p-3 mt-5" style="background-color: #2E7D32; color: white;">
  <p>© 2025 FERREMAS - Todos los derechos reservados</p>
</footer>

<script>
const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
const idProducto = window.location.pathname.split("/").filter(p => p).pop();

const isLocal = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
const baseApiUrl = isLocal
  ? "http://127.0.0.1:8000"
  : "https://prueba-propia-ferremas-production.up.railway.app";

const apiProductoURL = `${baseApiUrl}/productos/api/`;
const apiEditarURL = `${baseApiUrl}/productos/api/editar/${idProducto}/`;

// Obtener producto por ID desde lista
fetch(apiProductoURL)
  .then(res => res.json())
  .then(productos => {
    const producto = productos.find(p => p.id == idProducto);
    if (!producto) return alert("Producto no encontrado");

    document.getElementById("nombre").value = producto.nombre;
    document.getElementById("precio").value = producto.precio;
    document.getElementById("descripcion").value = producto.descripcion;
    document.getElementById("imagen").value = producto.imagen;
    document.getElementById("stock").value = producto.stock;
    document.getElementById("categoria").value = producto.categoria;
  });

// Guardar cambios al enviar formulario
document.getElementById("formEditar").addEventListener("submit", function(e) {
  e.preventDefault();

  const datos = {
    nombre: document.getElementById("nombre").value,
    precio: document.getElementById("precio").value,
    descripcion: document.getElementById("descripcion").value,
    imagen: document.getElementById("imagen").value,
    stock: document.getElementById("stock").value,
    categoria: document.getElementById("categoria").value,
  };

  fetch(apiEditarURL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrftoken
    },
    credentials: "same-origin",
    body: JSON.stringify(datos)
  })
  .then(res => {
    if (res.ok) {
      alert("Producto actualizado correctamente");
      window.location.href = "/productos/crud/";
    } else {
      return res.json().then(data => {
        alert("Error al actualizar: " + JSON.stringify(data));
      });
    }
  })
  .catch(err => {
    console.error("Error al enviar datos:", err);
    alert("Error al conectar con el servidor");
  });
});
</script>

</body>
</html>
