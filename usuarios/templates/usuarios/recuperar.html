{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow">
          <h4 class="mb-3 text-center">Recuperar Contraseña</h4>
          <p class="text-muted">Ingresa tu correo para enviarte instrucciones.</p>
          <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit" class="btn btn-success w-100">Enviar enlace</button></form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
