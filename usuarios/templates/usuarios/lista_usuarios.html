{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios - FERREMAS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f8;
    }
    .table-container {
      margin-top: 60px;
    }
  </style>
</head>
<body>

<div class="container table-container">
  <h2 class="mb-4 text-center">Lista de Usuarios</h2>
  <table class="table table-hover table-bordered">
    <thead class="table-success text-center">
      <tr>
        <th>RUT</th>
        <th>Nombre</th>
        <th>Usuario</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Rol</th>
      </tr>
    </thead>
    <tbody id="tabla-usuarios" class="text-center">
      <!-- Se llena con JavaScript -->
    </tbody>
  </table>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch('/api/usuarios/')
      .then(response => {
        if (!response.ok) throw new Error('Error al cargar usuarios');
        return response.json();
      })
      .then(data => {
        const tabla = document.getElementById("tabla-usuarios");
        if (data.length === 0) {
          tabla.innerHTML = "<tr><td colspan='6'>No hay usuarios registrados.</td></tr>";
        }
        data.forEach(usuario => {
          const fila = document.createElement("tr");
          fila.innerHTML = `
            <td>${usuario.rut}</td>
            <td>${usuario.first_name} ${usuario.last_name}</td>
            <td>${usuario.username}</td>
            <td>${usuario.email}</td>
            <td>${usuario.telefono}</td>
            <td>${usuario.is_staff ? 'Administrador' : 'Usuario'}</td>
          `;
          tabla.appendChild(fila);
        });
      })
      .catch(error => {
        const tabla = document.getElementById("tabla-usuarios");
        tabla.innerHTML = `<tr><td colspan="6" class="text-danger">${error.message}</td></tr>`;
      });
  });
</script>

</body>
</html>
