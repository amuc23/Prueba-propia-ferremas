{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{% static 'img/fondo.jpg' %}");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: #2E7D32;
        }

        .register-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: auto;
        }

        .register-container h2 {
            color: #333;
        }

        footer {
            background-color: #2E7D32;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Navbar con logo centrado -->
    <nav class="navbar navbar-custom py-3 shadow">
        <div class="container d-flex justify-content-center">
            <img src="{% static 'img/logo.png' %}" alt="logo" class="rounded" style="height: 70px;">
        </div>
    </nav>

    <!-- Registro -->
    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="register-container">
            <h2 class="text-center mb-4">Crear Cuenta</h2>
            <form>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Rut" required>
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nombre Completo" required>
                </div>
                <div class="mb-3">
                    <input type="tel" class="form-control" placeholder="Teléfono" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Correo electrónico" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Contraseña" required>
                </div>
                <div class="d-grid">
                    <a href="/">
                        <button type="button" class="btn btn-success" style="width: 100%;">Guardar</button>
                    </a>
                </div>
            </form>
            <div class="text-center mt-3">
                ¿Ya tienes una cuenta? <a href="/usuarios/iniciosesion/">Iniciar Sesión</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p class="mb-0">© 2025 FERREMAS - Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
