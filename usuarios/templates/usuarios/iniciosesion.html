{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{% static 'img/fondo.jpg' %}");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: #2E7D32;
            width: 100%;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: auto;
        }

        footer {
            background-color: #2E7D32;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: auto;
            width: 100%;
        }

        .alert {
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- Navbar con logo centrado -->
    <nav class="navbar navbar-custom text-white text-center py-3 shadow">
        <div class="container d-flex justify-content-center">
            <img src="{% static 'img/logo.png' %}" alt="logo" class="rounded" style="height: 70px;">
        </div>
    </nav>

    <!-- Login Content -->
    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="login-container">
            <h2 class="text-center mb-4">Iniciar Sesión</h2>
            <form id="loginForm">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" class="form-control" name="username" placeholder="Nombre de usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success" style="width: 100%;">Ingresar</button>
                </div>
            </form>
            <div class="text-center mt-3">
                ¿No tienes cuenta? <a href="/usuarios/registro/">Regístrate</a>
            </div>
            <div id="mensaje" class="mt-3 text-center"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p class="mb-0">© 2025 FERREMAS - Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para manejar el login -->
    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitButton = this.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Iniciando...';
        
        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => {
            data[key] = value;
        });
        
        fetch('/api/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            const mensajeDiv = document.getElementById('mensaje');
            if (data.status === 'success') {
                mensajeDiv.innerHTML = '<div class="alert alert-success">¡Inicio de sesión exitoso! Redirigiendo...</div>';
                setTimeout(() => {
                    window.location.href = data.redirect_url || '/';
                }, 1500);
            } else {
                mensajeDiv.innerHTML = '<div class="alert alert-danger">Error: ' + (data.message || 'Credenciales incorrectas') + '</div>';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            let errorMessage = 'Error al iniciar sesión. Intente nuevamente.';
            if (error && typeof error === 'object') {
                errorMessage = Object.values(error).join('<br>');
            }
            document.getElementById('mensaje').innerHTML = 
                `<div class="alert alert-danger">${errorMessage}</div>`;
        })
        .finally(() => {
            submitButton.disabled = false;
            submitButton.textContent = 'Ingresar';
        });
    });
    </script>
</body>
</html>
